<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Device Management</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <header class="glass-panel header">
            <div class="header-title">
                <i data-lucide="cpu" class="icon-lg"></i>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div>
                        <h1>Device Management</h1>
                        <p>OEE Edge Gateway Configuration</p>
                    </div>
                    <div id="socketStatus" class="tag tag-ok" style="opacity: 0.5;">
                        <span class="status-dot"></span> Disconnected
                    </div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="openModal('add')">
                <i data-lucide="plus"></i> Add Device
            </button>
        </header>

        <main class="glass-panel table-container">
            <table id="deviceTable">
                <thead>
                    <tr>
                        <th>Gateway</th>
                        <th>Node ID</th>
                        <th>Cloud ID (UUID)</th>
                        <th>Secret</th>
                        <th>OK/NG Channels</th>
                        <th>Live Metric</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="deviceTableBody">
                    <!-- Dynamic content -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state hidden">
                <i data-lucide="inbox"></i>
                <p>No devices mapped yet.</p>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="deviceModal" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2 id="modalTitle">Add Device</h2>
                <button type="button" class="btn-icon" onclick="closeModal()">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <form id="deviceForm" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="deviceId">
                <div class="form-group">
                    <label>Gateway ID</label>
                    <input type="text" id="gatewayId" placeholder="Leave blank for env default">
                </div>
                <div class="form-group">
                    <label>Physical Node ID (From)</label>
                    <input type="text" id="deviceIdFrom" required placeholder="e.g. C071">
                </div>
                <div class="form-group">
                    <label>Cloud UUID (To)</label>
                    <input type="text" id="deviceIdTo" required placeholder="00000000-0000-0000-0000-000000000000">
                </div>
                <div class="form-group">
                    <label>Device Secret (HMAC signature)</label>
                    <input type="text" id="deviceSecret" required placeholder="Base64 / JWT Secret">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>OK Channel</label>
                        <input type="number" id="okChannel" required placeholder="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>NG Channel</label>
                        <input type="number" id="ngChannel" required placeholder="1" min="0">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveButton">Save Mapping</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
