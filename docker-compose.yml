services:
  udp-responder:
    build:
      context: .
      network: host
    container_name: udp-responder
    command: ["python", "-u", "udp_server_secure.py"]
    restart: always
    network_mode: "host"
    env_file: .env
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  db:
    image: postgres:15-alpine
    container_name: iot-db
    restart: always
    env_file: .env
    ports:
      - "5433:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  oee-node:
    build:
      context: .
      network: host
    container_name: oee-node
    command: ["python", "-u", "oee_node.py"]
    restart: always
    network_mode: "host" 
    env_file: .env
    depends_on:
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  web-ui:
    build:
      context: .
    container_name: web-ui
    command: ["python", "-u", "web_server.py"]
    restart: always
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

# THIS SECTION WAS MISSING:
volumes:
  postgres_data:
