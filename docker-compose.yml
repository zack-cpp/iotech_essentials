services:
  db:
    image: postgres:15-alpine
    container_name: IoT-Essentials-DB
    restart: always
    env_file: .env
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    container_name: IoT-Essentials-backend
    restart: always
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
    container_name: IoT-Essentials-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  udp-responder:
    build:
      context: .
      dockerfile: Dockerfile.udp
    container_name: udp-responder
    restart: always
    # network_mode: "host"
    ports:
      - "${UDP_PORT}:${UDP_PORT}/udp"
    env_file: .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cli:
    build:
      context: .
      dockerfile: Dockerfile.cli
    environment:
      - GATEWAY_API_URL=http://IoT-Essentials-backend:8000
    depends_on:
      - backend
    profiles:
      - cli

volumes:
  postgres_data:
